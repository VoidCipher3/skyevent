name: Fetch Sky data & deploy
on:
  workflow_dispatch: {}

concurrency:
  group: sky-data-sync
  cancel-in-progress: false

permissions:
  contents: write
  
jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: pip install requests

      - name: Fetch & build
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 20
          command: cd scripts && python main.py
        env:
          B: ${{ secrets.B }}
          B1: ${{ secrets.B1 }}
          EVENT_NAMES_JSON: ${{ secrets.EVENT_NAMES_JSON }}
          SERVER_NAME: global
          SCRIPT_CLIENT: ${{ secrets.SCRIPT_CLIENT }}
          SCRIPT_CONVERTER: ${{ secrets.SCRIPT_CONVERTER }}
          SCRIPT_DIFF: ${{ secrets.SCRIPT_DIFF }}
          SCRIPT_TRANSLATE: ${{ secrets.SCRIPT_TRANSLATE }}

      - name: Deploy Worker (site + API)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 20
          command: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit archive & diff-state only
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archive docs/data/*.json
          git diff --cached --quiet || git commit -m "chore: update archive & data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push